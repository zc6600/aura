# Aura OS - Global Configuration
# 核心配置文件：定义 Agent 的运行边界与代谢规则

system:
  name: "Aura-Alpha"
  version: "1.0.0"
  workspace_root: "./projects" # 所有 Agent 项目的根目录
  default_language: "python3"
  log_level: "INFO"

# ----------------------------------------------------------------
# 记忆与代谢系统 (State Metabolism)
# ----------------------------------------------------------------
state_management:
  database_type: "sqlite"
  db_path: "state/aura_state.db"
  
  # 触发代谢的阈值（字符数）
  max_state_chars: 4000 
  
  # 总结策略
  summarization:
    enabled: true
    model: "gpt-4o" # 或你使用的其他总结模型
    keep_last_n_steps: 5 # 压缩时保留最近的 5 条原始操作记录
    compression_ratio: 0.2 # 目标压缩比

# ----------------------------------------------------------------
# 工具进化协议 (Tool Evolution Protocol)
# ----------------------------------------------------------------
tool_protocol:
  # 是否允许 Agent 安装系统依赖（需谨慎开启）
  allow_dependency_install: true
  
  # 自动运行测试的超时时间（秒）
  test_timeout: 30
  
  # 解释器映射
  runtimes:
    python: "python3"
    ruby: "ruby"
    shell: "bash"
    nodejs: "node"

  # 强制要求的工具文件（缺一不可则无法激活）
  required_files:
    - "logic.py"
    - "manifest.json"
    - "test.py"

# ----------------------------------------------------------------
# 权限与安全控制 (Unix-style Permissions)
# ----------------------------------------------------------------
security:
  # 严格模式：如果为 true，Agent 只能在 manifest 明确授权的目录下读写
  strict_path_isolation: true
  
  # 禁止 Agent 访问的文件后缀
  forbidden_extensions:
    - ".env"
    - ".key"
    - ".db-journal"

  # 系统级只读目录
  read_only_directories:
    - "system_tools"
    - "core_protocols"

# ----------------------------------------------------------------
# 感知引导系统 (Hint System)
# ----------------------------------------------------------------
hints:
  auto_inject_readme: true   # 是否自动注入 AURA_README.md
  scan_dot_hint_files: true  # 是否扫描 .hint 结尾的文件
  include_error_traceback: true # 测试失败时是否将完整 stderr 返回给 Agent